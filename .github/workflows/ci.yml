name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester + PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning, Error |
              Where-Object RuleName -notin 'PSAvoidUsingWriteHost', 'PSUseShouldProcessForStateChangingFunctions'
          $results | Format-Table -AutoSize | Out-String | Write-Host
          if (@($results | Where-Object Severity -eq 'Error').Count -gt 0) {
              throw 'PSScriptAnalyzer found errors'
          }
